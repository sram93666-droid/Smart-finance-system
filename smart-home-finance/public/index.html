<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#667eea" />
    <meta
      name="description"
      content="AI-Based Smart Home Finance Management System - Track expenses, get AI insights, and manage your finances intelligently"
    />
    <meta name="keywords" content="finance, budget, expense tracker, AI, smart home, money management" />
    <meta name="author" content="Smart Finance" />
    
    <!-- Open Graph / Social Media Meta Tags -->
    <meta property="og:title" content="Smart Home Finance Management System" />
    <meta property="og:description" content="AI-powered personal finance management with expense tracking and smart insights" />
    <meta property="og:type" content="website" />
    
    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    
    <!-- Manifest for PWA -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    
    <title>Smart Home Finance | AI-Powered Money Management</title>
    
    <!-- Font Awesome (optional fallback) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    
    <style>
      /* Global loading styles */
      #root {
        min-height: 100vh;
      }
      
      .loading-screen {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999;
      }
      
      .loader {
        text-align: center;
        color: white;
      }
      
      .loader-spinner {
        width: 50px;
        height: 50px;
        border: 3px solid rgba(255,255,255,0.3);
        border-radius: 50%;
        border-top-color: white;
        animation: spin 1s ease-in-out infinite;
        margin: 0 auto 20px;
      }
      
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      
      .loader-text {
        font-size: 18px;
        font-weight: 500;
      }
      
      /* Hide loading screen when app is ready */
      .loading-screen.hide {
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Loading screen - will be hidden when React loads -->
      <div class="loading-screen" id="loading-screen">
        <div class="loader">
          <div class="loader-spinner"></div>
          <div class="loader-text">Loading Smart Finance...</div>
        </div>
      </div>
    </div>
    
    <script>
      // Hide loading screen when React is ready
      window.addEventListener('load', function() {
        setTimeout(function() {
          const loadingScreen = document.getElementById('loading-screen');
          if (loadingScreen) {
            loadingScreen.classList.add('hide');
          }
        }, 500);
      });
    </script>
  </body>
</html>
